<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Intake Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- DEMO OVERLAY -->
  <div id="demoOverlay">
    <div class="demo-content">
      <h1 id="demoTitle">Clinical Intake Demo</h1>

      <select id="demoLanguageSelect"></select>

      <p id="demoIntro">
        This demo showcases a multi‑department clinical intake system.
        It can be adapted for Sleep Medicine, Cardiology, Neurology, etc.
        Click Start Demo to begin.
      </p>

      <div class="tour-buttons">
        <button id="startDemoBtn" class="btn-primary">Start Demo</button>
        <button id="exitDemoBtn" class="btn-secondary">Exit</button>
      </div>
    </div>
  </div>

  <!-- GUIDED TOUR OVERLAY -->
  <div id="tourOverlay" class="tour-overlay hidden"></div>
  <div id="tourTooltip" class="tour-tooltip hidden">
    <h3 id="tourTitle"></h3>
    <p id="tourText"></p>
    <div class="tour-buttons">
      <button id="tourNextBtn" class="btn-primary">Next</button>
      <button id="tourExitBtn" class="btn-secondary">Exit</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app-container">

    <!-- HEADER -->
    <div class="app-header">
      <h2>Clinical Intake Demo</h2>
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="settings-row">
      <label>Language:</label>
      <select id="languageSelect"></select>
    </div>

    <!-- CHAT WINDOW -->
    <div class="chat-window" id="chatWindow"></div>

    <!-- INPUT AREA -->
    <div class="input-controls-row">
      <div class="control-buttons">
        <button id="startBtn" class="btn-primary">Start</button>
        <button id="restartBtn" class="btn-secondary">Restart</button>
        <button id="exitBtn" class="btn-danger">Exit</button>
      </div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your response..." />
        <button id="micBtn" class="mic-button">🎤</button>
      </div>
    </div>

  </div>

  <script src="translations.js"></script>
  <script src="interviewQuestions2.js"></script>
  <script src="summaryBuilder2.js"></script>
  <script src="interviewFlow2.js"></script>
  <script src="script.js"></script>

</body>
</html>
