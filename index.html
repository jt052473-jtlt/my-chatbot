<div class="app-container">
    <header>
        <h1 id="tour-step-1">Clinical Intake Assistant</h1>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </header>

    <main>
        <div class="settings-bar" id="tour-step-2">
            <select id="language-select" onchange="updateLanguageState()">
                </select>
            <div class="voice-controls" id="tour-step-3">
                <label><input type="checkbox" id="read-aloud-chk" checked> Read Aloud</label>
                <label><input type="checkbox" id="voice-mode-chk" checked> Voice Mode</label>
            </div>
        </div>

        <div id="chat-container" class="chat-window" id="tour-step-4"></div>

        <div class="controls-grid" id="tour-step-5">
            <button id="start-btn" class="btn-primary" onclick="handleStart()">Start</button>
            <button id="pause-btn" class="btn-secondary" onclick="togglePause()">Pause</button>
            <button id="reset-btn" class="btn-danger" onclick="resetApp()">Reset</button>
        </div>
    </main>
</div>
