<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Intake Assistant</title>

<style>
    :root {
        --blue-main: #0050c8;
    }

    * { box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f2f2f7;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    .layout {
        display: flex;
        width: 95%;
        max-width: 1000px;
        gap: 16px;
        padding: 16px 0;
    }

    .left-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    .header-title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 6px 0;
    }

    .progress-container {
        width: 100%;
        height: 4px;
        background: #e5e5ea;
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 8px;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: #ffffff;
        transition: width 0.25s ease, background-color 0.25s ease;
    }

    #chat {
        flex: 1;
        min-height: 260px;
        max-height: 420px;
        overflow-y: auto;
        padding: 12px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        margin-bottom: 10px;
    }

    .message {
        padding: 8px 12px;
        border-radius: 14px;
        margin-bottom: 8px;
        max-width: 80%;
        line-height: 1.4;
        font-size: 14px;
    }

    .bot { background: #e5e5ea; color: #000; }
    .user { background: var(--blue-main); color: white; margin-left: auto; }

    /* SETTINGS ROW */
    .settings-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
        flex-wrap: wrap;
        font-size: 13px;
    }

    .setting-group {
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
    }

    select {
        padding: 4px 6px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 13px;
    }

    /* SEARCH BAR */
    #languageSearch {
        padding: 6px 10px 6px 28px;
        border-radius: 14px;
        border: 1px solid #ccc;
        font-size: 13px;
        width: 150px;
        background: #fff url('data:image/svg+xml;utf8,<svg fill="gray" height="14" viewBox="0 0 24 24" width="14" xmlns="http://www.w3.org/2000/svg"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>') no-repeat 8px center;
        background-size: 14px;
    }

    .input-row {
        display: flex;
        gap: 8px;
    }

    #textInput {
        flex: 1;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid #d1d1d6;
        font-size: 14px;
    }

    #sendBtn {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: var(--blue-main);
        color: white;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        cursor: pointer;
    }

    #sendBtn:hover { background: #003c96; }

    .right-panel {
        width: 180px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .control-btn {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
    }

    #micButton {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #c7c7cc;
        color: white;
        font-size: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 10px auto 0 auto;
        cursor: pointer;
        transition: 0.2s;
    }

    #micButton.active {
        background: var(--blue-main);
        box-shadow: 0 0 12px rgba(0,80,200,0.6);
    }

    #printBtn { display: none; margin-top: 4px; }

</style>
</head>

<body>

<div class="layout">

    <div class="left-panel">

        <h2 class="header-title">Sleep Intake Assistant</h2>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="chat"></div>

        <div class="settings-row">

            <div class="setting-group">
                <span>🌐 Language:</span>
                <select id="languageSelect"></select>
            </div>

            <input id="languageSearch" type="text" placeholder="Search languages…">

            <div class="setting-group">
                <span>🔊 Read Aloud</span>
                <input type="checkbox" id="readAloudToggle">
            </div>

            <div class="setting-group">
                <span>🎙️ Voice Mode</span>
                <input type="checkbox" id="voiceModeToggle">
            </div>

        </div>

        <div class="input-row">
            <input id="textInput" type="text" placeholder="Type your response...">
            <button id="sendBtn">➤</button>
        </div>

    </div>

    <div class="right-panel">
        <button class="control-btn" id="startBtn">▶️ Start</button>
        <button class="control-btn" id="pauseBtn">⏸️ Pause</button>
        <button class="control-btn" id="finishBtn">🛑 Finish</button>
        <button class="control-btn" id="repeatBtn">🔁 Repeat</button>
        <button class="control-btn" id="skipBtn">⏭️ Skip</button>
        <button class="control-btn" id="resetBtn">🔄 Reset</button>
        <div id="micButton">🎤</div>
        <button class="control-btn" id="printBtn">🖨️ Print Summary</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
