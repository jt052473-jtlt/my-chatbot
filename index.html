<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Intake Assistant | The 423 Initiative</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="demoOverlay">
        <div class="demo-content">
            <h1>Clinical Intake Assistant</h1>
            <p>
                This demo showcases a sleep intake workflow. The underlying engine supports 
                multi‑department clinical intake for Cardiology, Neurology, and more.
            </p>
            <button id="startDemoBtn">Start Demo</button>
        </div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <h2>Sleep Intake Assistant</h2>
        </header>

        <main class="app-main">
            <section class="left-panel">
                <div class="control-buttons">
                    <button id="startBtn" class="btn-primary">Start</button>
                    <button id="pauseBtn">Pause</button>
                    <button id="finishBtn">Finish</button>
                    <button id="repeatBtn">Repeat</button>
                    <button id="skipBtn">Skip</button>
                    <button id="resetBtn">Reset</button>
                </div>

                <div class="accessibility-controls">
                    <button id="readAloudBtn">Read Aloud</button>
                    <button id="voiceModeBtn">Voice Mode</button>
                    <button id="micBtn" class="mic-button">🎤</button>
                </div>
            </section>

            <section class="right-panel">
                <div id="chatWindow" class="chat-window">
                    </div>

                <div class="input-area">
                    <input type="text" id="userInput" placeholder="Type your response here..." autofocus>
                    <button id="sendBtn">Send</button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
