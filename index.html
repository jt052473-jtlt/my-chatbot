<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinical Intake Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- INTRO SECTION -->
    <section id="introSection" class="container">
        <h1 id="introTitle">Clinical Intake Demo</h1>
        <p id="introSubtitle">A simple multilingual intake assistant</p>

        <div>
            <button class="lang-btn" data-lang="en">English</button>
            <button class="lang-btn" data-lang="es">Español</button>
            <button class="lang-btn" data-lang="fr">Français</button>
        </div>

        <button id="startDemoBtn">Start Demo</button>
    </section>

    <!-- INTERVIEW SECTION -->
    <section id="interviewSection" class="container">
        <h2 id="questionText"></h2>

        <input
            id="responseInput"
            type="text"
            placeholder="Type your response..."
        />

        <button id="nextBtn">Next</button>

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>
        <div id="progressCount"></div>
    </section>

    <!-- SUMMARY SECTION -->
    <section id="summarySection" class="container">
        <h2 id="summaryTitle">Summary of Responses</h2>
        <div id="summaryContent"></div>
    </section>

    <!-- GUIDED TOUR OVERLAY -->
    <div id="tourOverlay">
        <div id="tourBox">
            <div id="tourText"></div>
            <button id="tourNextBtn">Next</button>
        </div>
    </div>

    <!-- MAIN SCRIPT LOADER -->
    <script type="module" src="script.js"></script>

</body>
</html>
