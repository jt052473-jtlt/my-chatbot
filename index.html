<!DOCTYPE html>
<html>
<head>
  <title>Sleep Intake Chatbot</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    #chat { background: white; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
    .msg { margin-bottom: 15px; }
    .bot { color: #1a73e8; font-weight: bold; }
    .user { color: #333; }
    input, button { padding: 10px; font-size: 16px; width: 100%; margin-top: 10px; }
  </style>
</head>
<body>

<div id="chat">
  <h2>Sleep Intake Chatbot</h2>
  <div id="messages"></div>

  <input id="answerInput" placeholder="Type your answer..." />
  <button onclick="sendAnswer()">Send</button>
  <button onclick="stopSession()" style="background:#e53935;color:white;">Finish</button>
</div>

<script>
let sessionId = null;

function addMessage(text, sender) {
  const messages = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function startSession() {
  const res = await fetch("https://mychatbot-backend-c2yu.onrender.com/start", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({})
  });

  const data = await res.json();
  sessionId = data.session_id;

  addMessage(data.message, "bot");

  if (data.next_question) {
    addMessage(data.next_question.prompt, "bot");
  }
}

async function sendAnswer() {
  const answer = document.getElementById("answerInput").value;
  if (!answer.trim()) return;

  addMessage(answer, "user");
  document.getElementById("answerInput").value = "";

  const res = await fetch("https://mychatbot-backend-c2yu.onrender.com/intake", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ session_id: sessionId, answer_text: answer })
  });

  const data = await res.json();

  if (data.message) {
    addMessage(data.message, "bot");
  }

  if (data.next_question) {
    addMessage(data.next_question.prompt, "bot");
  }

  if (data.human_summary) {
    addMessage("Summary:\n" + data.human_summary, "bot");
  }
}

async function stopSession() {
  const res = await fetch("https://mychatbot-backend-c2yu.onrender.com/stop", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ session_id: sessionId })
  });

  const data = await res.json();

  addMessage(data.message, "bot");

  if (data.human_summary) {
    addMessage("Summary:\n" + data.human_summary, "bot");
  }
}

startSession();
</script>

</body>
</html>
