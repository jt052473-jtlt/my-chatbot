<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Intake Assistant</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f2f2f7;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 30px;
    }

    .app-container {
        width: 95%;
        max-width: 480px;
        background: #ffffff;
        border-radius: 22px;
        padding: 20px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }

    h2 {
        text-align: center;
        margin-top: 0;
        font-weight: 700;
        color: #1c1c1e;
    }

    /* Chat Window */
    #chat {
        height: 360px;
        overflow-y: auto;
        padding: 15px;
        background: #f8f8fa;
        border-radius: 16px;
        margin-bottom: 20px;
    }

    .message {
        padding: 10px 14px;
        border-radius: 14px;
        margin-bottom: 10px;
        max-width: 80%;
        line-height: 1.4;
    }

    .bot {
        background: #e5e5ea;
        color: #000;
        align-self: flex-start;
    }

    .user {
        background: #007aff;
        color: white;
        align-self: flex-end;
        margin-left: auto;
    }

    /* Progress Bar */
    .progress-container {
        width: 100%;
        height: 8px;
        background: #e5e5ea;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    #progressBar {
        height: 8px;
        width: 0%;
        background: #34c759;
        border-radius: 10px;
        transition: width 0.3s ease;
    }

    /* Controls Card */
    .controls-card {
        background: #ffffff;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        margin-bottom: 20px;
    }

    .controls-row {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
    }

    button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 14px;
        background: #f2f2f7;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #e5e5ea;
    }

    /* Mic Button */
    #micButton {
        width: 60px;
        height: 60px;
        background: #ff3b30;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        margin: 0 auto 20px auto;
        cursor: pointer;
        transition: 0.2s;
    }

    #micButton.active {
        background: #ff453a;
        box-shadow: 0 0 12px rgba(255,59,48,0.6);
    }

    /* Input Row */
    .input-row {
        display: flex;
        gap: 10px;
    }

    #textInput {
        flex: 1;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid #d1d1d6;
        font-size: 15px;
    }

    #sendBtn {
        background: #007aff;
        color: white;
    }

    /* Settings Row */
    .settings-row {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    select, label {
        font-size: 14px;
    }
</style>
</head>

<body>
<div class="app-container">

    <h2>Sleep Intake Assistant</h2>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <div id="chat"></div>

    <div id="micButton">🎤</div>

    <div class="controls-card">
        <div class="controls-row">
            <button id="startBtn">▶️ Start</button>
            <button id="pauseBtn">⏸️ Pause</button>
            <button id="finishBtn">🛑 Finish</button>
        </div>

        <div class="controls-row">
            <button id="repeatBtn">🔁 Repeat</button>
            <button id="skipBtn">⏭️ Skip</button>
            <button id="resetBtn">🔄 Reset</button>
        </div>
    </div>

    <div class="input-row">
        <input id="textInput" type="text" placeholder="Type your response...">
        <button id="sendBtn">📨 Send</button>
    </div>

    <div class="settings-row">
        <label>
            🌐 Language:
            <select id="languageSelect">
                <option value="en-US">English (US)</option>
                <option value="es-ES">Spanish</option>
                <option value="fr-FR">French</option>
            </select>
        </label>

        <label>
            🔊 Read Aloud
            <input type="checkbox" id="readAloudToggle">
        </label>

        <label>
            🎙️ Voice Mode
            <input type="checkbox" id="voiceModeToggle">
        </label>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
