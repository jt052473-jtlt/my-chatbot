<div class="settings-bar">
    <select id="language-select" onchange="updateLanguageState()">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="zh">Chinese</option>
        <option value="tl">Tagalog</option>
        <option value="vi">Vietnamese</option>
    </select>
</div>

<div class="controls-grid">
    <button id="start-btn" class="btn-primary" onclick="handleStart()">Start</button>
    <button id="pause-btn" class="btn-secondary" onclick="togglePause()">Pause</button>
    <button id="finish-btn" class="btn-primary" onclick="generateSummary()">Finish</button>
    <button id="repeat-btn" class="btn-secondary" onclick="repeatLast()">Repeat</button>
    <button id="skip-btn" class="btn-secondary" onclick="skipQuestion()">Skip</button>
    <button id="reset-btn" class="btn-danger" onclick="resetApp()">Reset</button>
</div>

<script src="translations.js"></script>
<script src="interviewQuestions2.js"></script>
<script src="summaryBuilder2.js"></script>
<script src="script.js"></script>
