<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinical Intake Assistant</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="app">

        <!-- HEADER -->
        <header id="header">
            <h1 id="appTitle">Clinical Intake Assistant</h1>
        </header>

        <!-- SETTINGS BAR -->
        <div id="settingsBar">

            <!-- Language Selector -->
            <div class="settings-group">
                <label class="field-label">Language</label>
                <select id="languageSelect">
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Russian">Russian</option>
                </select>
            </div>

            <!-- ⭐ NEW: Form Selector -->
            <div class="settings-group">
                <label class="field-label">Form</label>
                <select id="formSelect">
                    <option value="admission">Admission Form</option>
                    <option value="sleep">Sleep Form</option>
                </select>
            </div>

            <!-- Voice Mode -->
            <div class="settings-group">
                <label class="field-label">Voice Mode</label>
                <button id="toggleVoice">Voice Mode</button>
            </div>

        </div>

        <!-- CHAT WINDOW -->
        <div id="chatWindow"></div>

        <!-- INPUT AREA -->
        <div id="inputArea">
            <textarea id="userInput" placeholder="Type your response here..."></textarea>
            <button id="sendBtn">Send</button>
        </div>

        <!-- CONTROLS -->
        <div id="controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
            <button id="repeatBtn">Repeat</button>
            <button id="skipBtn">Skip</button>
            <button id="resetBtn">Reset</button>
            <button id="finishBtn">Finish</button>
        </div>

        <!-- PROGRESS BAR -->
        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>

        <!-- GUIDED TOUR -->
        <div id="tourBox" class="hidden">
            <h3 id="tourTitle"></h3>
            <p id="tourText"></p>
            <button id="tourNext">Next</button>
            <button id="tourExit">Exit</button>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="translations.js"></script>
    <script src="script.js"></script>
    <script src="uiController.js"></script>
    <script src="tour.js"></script>
    <script src="voiceEngine.js"></script>
    <script src="mic.js"></script>

    <!-- ⭐ Updated multilingual form logic -->
    <script src="interviewFlow2.js"></script>
    <script src="summaryBuilder2.js"></script>

</body>
</html>
