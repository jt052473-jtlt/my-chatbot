<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Intake Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h2 id="appTitle">Clinical Intake Assistant</h2>
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </header>

        <main>
            <div class="settings-bar">
                <div class="language-controls">
                    <select id="languageSelect">
                        </select>
                    <input type="text" id="languageSearch" placeholder="Search language...">
                </div>

                <div class="voice-controls">
                    <label>
                        <input type="checkbox" id="readAloudToggle" checked> 
                        <span id="readAloudLabel">Read Aloud</span>
                    </label>
                    <label>
                        <input type="checkbox" id="voiceModeToggle" checked> 
                        <span id="voiceModeLabel">Voice Mode</span>
                    </label>
                    <button id="micBtn" class="mic-button">🎤</button>
                </div>
            </div>

            <div id="chatWindow" class="chat-window"></div>

            <div class="controls-grid">
                <button id="startBtn" class="btn btn-primary">Start</button>
                <button id="pauseBtn" class="btn btn-secondary">Pause</button>
                <button id="finishBtn" class="btn btn-success">Finish</button>
                <button id="repeatBtn" class="btn btn-info">Repeat</button>
                <button id="skipBtn" class="btn btn-warning">Skip</button>
                <button id="resetBtn" class="btn btn-danger">Reset</button>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your response here...">
                <button id="sendBtn" class="btn btn-send">Send</button>
            </div>
        </main>
    </div>

    <div id="demoOverlay" class="overlay">
        <div class="overlay-content">
            <h3>Welcome to the Demo</h3>
            <p>Experience our automated clinical intake process.</p>
            <button id="startDemoBtn" class="btn btn-primary">Start Demo</button>
            <button id="exitDemoBtn" class="btn btn-secondary">Exit</button>
        </div>
    </div>

    <div id="tourOverlay" class="overlay hidden">
        <div id="tourTooltip" class="tour-tooltip hidden">
            <h4 id="tourTitle"></h4>
            <p id="tourText"></p>
            <div class="tour-buttons">
                <button id="tourNextBtn" class="btn btn-sm btn-primary">Next</button>
                <button id="tourExitBtn" class="btn btn-sm btn-secondary">Exit Tour</button>
            </div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="interviewQuestions2.js"></script>
    <script src="script.js"></script>
</body>
</html>
