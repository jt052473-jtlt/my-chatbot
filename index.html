<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Intake Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Demo overlay -->
    <div id="demoOverlay">
        <div class="demo-content">
            <h1>Clinical Intake Assistant</h1>
            <p>This demo shows how the intake assistant works.</p>
            <button id="startDemoBtn" class="btn-primary">Start Demo</button>
        </div>
    </div>

    <!-- Dim background during tour -->
    <div id="tourOverlay" class="hidden"></div>

    <!-- Chat window -->
    <div id="chatWindow" class="chat-window">
        <div id="tourTooltip" class="tour-tooltip hidden">
            <h3 id="tourTitle"></h3>
            <p id="tourText"></p>

            <div class="tour-buttons">
                <button id="tourNextBtn" class="btn-primary">Next</button>
                <button id="tourExitBtn">Exit</button>
            </div>
        </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type here...">
        <button id="sendBtn" class="btn-primary">Send</button>
    </div>

    <!-- IMPORTANT: Cache‑buster -->
    <script src="script.js?v=20"></script>
</body>
</html>
