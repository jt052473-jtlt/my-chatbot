<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sleep Intake with Sam</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f2f2f7;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 850px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #1a73e8;
    }

    /* Start Screen */
    #startScreen {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    #startScreen h2 {
      margin-top: 0;
    }

    #startScreen label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    select, input[type="checkbox"], button {
      margin-top: 6px;
    }

    /* Controls Row */
    #controlsRow {
      display: none;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 10px;
    }

    #instructionBanner {
      font-size: 14px;
      color: #444;
    }

    #typingIndicator {
      font-size: 13px;
      color: #777;
      display: none;
    }

    /* Progress Bar */
    #progressBarContainer {
      display: none;
      width: 100%;
      background: #e0e0e0;
      height: 10px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #1a73e8;
      transition: width 0.3s ease;
    }

      border-radius: 12px;
      padding: 15px;
      height: 420px;
      overflow-y: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
