<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Intake Assistant</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #fafafa;
      color: #111;
      padding: 2rem;
    }

    .app-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .app-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .app-header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.5px;
    }

    .app-header p {
      margin-top: 0.5rem;
      color: #555;
      font-size: 1rem;
    }

    .app-main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 900px) {
      .app-main {
        grid-template-columns: 1fr;
      }
    }

    .chat-section {
      background: #fff;
      border-radius: 18px;
      padding: 1.5rem;
      height: 70vh;
      display: flex;
      flex-direction: column;
      border: 1px solid #e5e5e5;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.5rem;
      margin-bottom: 1rem;
    }

    .message {
      margin-bottom: 1rem;
      display: flex;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .message.user .bubble {
      background: #007aff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #f2f2f7;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .chat-form {
      display: flex;
      gap: 0.5rem;
    }

    .chat-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      border: 1px solid #d1d1d6;
      background: #fff;
      font-size: 1rem;
    }

    .chat-input:focus {
      outline: none;
      border-color: #007aff;
    }

    .chat-submit {
      padding: 0.75rem 1.25rem;
      border-radius: 999px;
      border: none;
      background: #007aff;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 1.25rem;
      border: 1px solid #e5e5e5;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #111;
    }

    .btn {
      padding: 0.6rem 1rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 0.5rem;
    }

    .btn-primary {
      background: #34c759;
      color: white;
    }

    .btn-secondary {
      background: #f2f2f7;
      color: #111;
      border: 1px solid #d1d1d6;
    }

    .json-viewer {
      background: #f8f8f8;
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.85rem;
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid #e5e5e5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="app-container">

    <header class="app-header">
      <h1>Sleep Intake Assistant</h1>
      <p>Guided clinical intake with structured output.</p>
    </header>

    <main class="app-main">

      <!-- CHAT SECTION -->
      <section class="chat-section">
        <div id="chatWindow" class="chat-window"></div>

        <!-- Chat Input -->
        <form id="chatForm" class="chat-form">
          <input
            id="chatInput"
            type="text"
            class="chat-input"
            placeholder="Type your message…"
            autocomplete="off"
          />
          <button type="submit" class="chat-submit">Send</button>
        </form>
      </section>

      <!-- SIDEBAR SECTION -->
      <section class="sidebar-section">

        <div class="card">
          <h2>Session Controls</h2>
          <button id="startInterview" class="btn btn-primary">Start Interview</button>
          <button id="resetInterview" class="btn btn-secondary">Reset</button>
        </div>

        <div class="card">
          <h2>Structured Output</h2>
          <pre id="jsonOutput" class="json-viewer">{}</pre>
        </div>

      </section>

    </main>

  </div>
  <!-- ========================= -->
  <!--   BEGIN JAVASCRIPT LOGIC  -->
  <!-- ========================= -->
  <script>
    /* ---------------------------------------------
       SESSION + DOM ELEMENTS
    --------------------------------------------- */
    let sessionId = null;

    const chatWindow = document.getElementById("chatWindow");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const jsonOutput = document.getElementById("jsonOutput");
    const startInterviewBtn = document.getElementById("startInterview");
    const resetInterviewBtn = document.getElementById("resetInterview");

    /* ---------------------------------------------
       INTERVIEW STATE
    --------------------------------------------- */
    let interviewActive = false;
    let voiceMode = false;
    let listening = false;

    /* ---------------------------------------------
       SPEECH RECOGNITION (Apple-style minimal)
    --------------------------------------------- */
    let recognition = null;

    if ("webkitSpeechRecognition" in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = "en-US";
    }

    /* ---------------------------------------------
       BASIC MESSAGE RENDERING
    --------------------------------------------- */
    function baseAddMessage(sender, text) {
      const msg = document.createElement("div");
      msg.className = `message ${sender}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      msg.appendChild(bubble);
      chatWindow.appendChild(msg);

      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    /* ---------------------------------------------
       ASSISTANT SPEAKS (Apple voice preference)
    --------------------------------------------- */
    function speak(text) {
      try {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);

        const voices = synth.getVoices();
        const preferred = voices.find(v =>
          v.name.toLowerCase().includes("samantha") ||
          v.name.toLowerCase().includes("female") ||
          v.name.toLowerCase().includes("zira")
        );

        if (preferred) utter.voice = preferred;

        utter.pitch = 1.02;
        utter.rate = 0.98;
        utter.volume = 1.0;

        synth.speak(utter);
      } catch (e) {
        console.warn("Speech synthesis not available.");
      }
    }

    /* ---------------------------------------------
       WRAPPED addMessage (with optional voice)
    --------------------------------------------- */
    function addMessage(sender, text) {
      baseAddMessage(sender, text);

      if (sender === "assistant" && voiceMode && interviewActive) {
        speak(text);
      }
    }
    /* ---------------------------------------------
       SEND MESSAGE TO BACKEND (WITH SESSION)
    --------------------------------------------- */
    async function sendMessage(text) {
      if (!text.trim()) return;

      addMessage("user", text);

      try {
        const response = await fetch("https://mychatbot-backend-c2yu.onrender.com/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            session_id: sessionId
          })
        });

        const data = await response.json();

        // Save session ID from backend
        if (data.session_id) {
          sessionId = data.session_id;
        }

        // Show backend's natural-language reply (if any)
        if (data.reply) {
          addMessage("assistant", data.reply);
        }

        // Show structured output
        if (data.structured_output) {
          jsonOutput.textContent = JSON.stringify(data.structured_output, null, 2);
        }

        // After backend reply, move to next scripted question
        if (interviewActive) {
          askNextQuestion();
        }

        // Auto-listen again if voice mode is active
        if (voiceMode && interviewActive) {
          startListening();
        }

      } catch (err) {
        addMessage("assistant", "⚠️ Error contacting server.");
      }
    }

    /* ---------------------------------------------
       CHAT FORM SUBMIT
    --------------------------------------------- */
    chatForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = chatInput.value;
      chatInput.value = "";
      sendMessage(text);
    });

    /* ---------------------------------------------
       START LISTENING (MIC)
    --------------------------------------------- */
    function startListening() {
      if (!recognition || listening === true) return;

      listening = true;
      micButton.style.background = "#34c759";

      recognition.start();

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        listening = false;
        micButton.style.background = "#007aff";
        sendMessage(transcript);
      };

      recognition.onerror = () => {
        listening = false;
        micButton.style.background = "#007aff";
        addMessage("assistant", "⚠️ I couldn't hear that.");
      };

      recognition.onend = () => {
        listening = false;
        micButton.style.background = "#007aff";
      };
    }

    /* ---------------------------------------------
       MIC BUTTON CLICK
    --------------------------------------------- */
    micButton.addEventListener("click", () => {
      if (!interviewActive) return;
      startListening();
    });
    /* ---------------------------------------------
       SCRIPTED CLINICAL INTERVIEW (MODE B)
    --------------------------------------------- */
    const intakeQuestions = [
      "To begin, can you tell me your full name?",
      "What is your date of birth?",
      "What brings you in today regarding your sleep?",
      "How long has this issue been going on?",
      "What time do you usually go to bed on weekdays?",
      "What time do you usually wake up on weekdays?",
      "Do you snore loudly or has anyone told you that you stop breathing in your sleep?",
      "Do you have trouble falling asleep, staying asleep, or both?",
      "Do you feel sleepy during the day, such as while reading, watching TV, or driving?",
      "Do you have any diagnosed medical conditions?",
      "Are you taking any medications or sleep aids?",
      "Is there anything else about your sleep that you think is important?"
    ];

    let currentQuestionIndex = -1;

    function askNextQuestion() {
      currentQuestionIndex += 1;

      if (currentQuestionIndex < intakeQuestions.length) {
        addMessage("assistant", intakeQuestions[currentQuestionIndex]);
      } else {
        addMessage("assistant", "Thank you. Your sleep intake is complete. Your provider can now review your structured summary.");
      }
    }

    /* ---------------------------------------------
       VOICE MODE TOGGLE
    --------------------------------------------- */
    voiceModeToggle.addEventListener("click", () => {
      voiceMode = !voiceMode;

      if (voiceMode) {
        voiceModeToggle.textContent = "Voice Mode: ON";
        voiceModeToggle.style.background = "#34c759";
        voiceModeToggle.style.color = "#fff";

        if (interviewActive) startListening();
      } else {
        voiceModeToggle.textContent = "Voice Mode: OFF";
        voiceModeToggle.style.background = "#f2f2f7";
        voiceModeToggle.style.color = "#111";
      }
    });

    /* ---------------------------------------------
       START INTERVIEW
    --------------------------------------------- */
    startInterviewBtn.addEventListener("click", () => {
      interviewActive = true;
      currentQuestionIndex = -1;

      micButton.style.display = "block";
      voiceModeToggle.style.display = "block";

      addMessage("assistant", "Great. Let's begin your sleep intake.");
      askNextQuestion();

      if (voiceMode) startListening();
    });

    /* ---------------------------------------------
       RESET INTERVIEW
    --------------------------------------------- */
    resetInterviewBtn.addEventListener("click", () => {
      interviewActive = false;
      voiceMode = false;
      listening = false;
      sessionId = null;
      currentQuestionIndex = -1;

      micButton.style.display = "none";
      voiceModeToggle.style.display = "none";

      chatWindow.innerHTML = "";
      jsonOutput.textContent = "{}";

      voiceModeToggle.textContent = "Voice Mode: OFF";
      voiceModeToggle.style.background = "#f2f2f7";
      voiceModeToggle.style.color = "#111";

      addMessage("assistant", "Interview reset. Ready when you are.");
    });
  </script>
</body>
</html>
