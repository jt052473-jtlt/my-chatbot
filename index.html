<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 423 Initiative | Sleep Intake Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Apple-style demo overlay -->
    <div id="demoOverlay">
        <div class="demo-content">
            <h1>Clinical Intake Assistant</h1>
            <p>
                The 423 Initiative engine supports multi‑department clinical intake across 
                Cardiology, Neurology, and Sleep Medicine.
            </p>
            <button id="startDemoBtn">Start Demo</button>
        </div>
    </div>

    <div class="app-container">

        <header class="app-header">
            <h2>Sleep Intake Assistant</h2>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div id="progressBar"></div>
            </div>
        </header>

        <!-- SETTINGS ROW -->
        <div class="settings-row">
            <select id="languageSelect"></select>
            <input type="text" id="languageSearch" placeholder="Search language...">

            <label class="toggle">
                <input type="checkbox" id="readAloudToggle">
                <span>Read Aloud</span>
            </label>

            <label class="toggle">
                <input type="checkbox" id="voiceModeToggle">
                <span>Voice Mode</span>
            </label>

            <button id="micBtn" class="mic-button">🎤</button>
        </div>

        <!-- CHAT WINDOW -->
        <div id="chatWindow" class="chat-window"></div>

        <!-- INPUT + CONTROLS -->
        <div class="input-controls-row">

            <div class="control-buttons">
                <button id="startBtn" class="btn-primary">Start</button>
                <button id="pauseBtn">Pause</button>
                <button id="finishBtn">Finish</button>
                <button id="repeatBtn">Repeat</button>
                <button id="skipBtn">Skip</button>
                <button id="resetBtn" class="btn-danger">Reset</button>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your response here..." autofocus>
                <button id="sendBtn" class="btn-primary">Send</button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
