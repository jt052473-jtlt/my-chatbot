<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Intake Assistant</title>

    <!-- Base Styles -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #050816;
            color: #e5e7eb;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .app-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .app-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .app-main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .chat-section {
            background: radial-gradient(circle at top, #1f2937, #020617);
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            height: 70vh;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
            margin-bottom: 1rem;
        }

        .message {
            margin-bottom: 0.75rem;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 0.6rem 0.8rem;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.user .bubble {
            background: #4f46e5;
            color: white;
            border-bottom-right-radius: 0.1rem;
        }

        .message.assistant .bubble {
            background: #111827;
            border-bottom-left-radius: 0.1rem;
        }

        .chat-form {
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.6rem 0.75rem;
            border-radius: 999px;
            border: 1px solid #374151;
            background: #020617;
            color: #e5e7eb;
        }

        .chat-input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .chat-submit {
            padding: 0.6rem 1rem;
            border-radius: 999px;
            border: none;
            background: #6366f1;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .chat-submit:hover {
            background: #4f46e5;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background: #020617;
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid #111827;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 0.75rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .btn-primary {
            background: #22c55e;
            color: #022c22;
        }

        .btn-secondary {
            background: #111827;
            color: #e5e7eb;
            border: 1px solid #374151;
        }

        .btn-primary:hover {
            background: #16a34a;
        }

        .btn-secondary:hover {
            background: #020617;
        }

        .json-viewer {
            background: #020617;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.8rem;
            max-height: 260px;
            overflow-y: auto;
            border: 1px solid #111827;
        }

        .app-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #9ca3af;
        }
    </style>
</head>

<body>
<div class="app-container">
    <header class="app-header">
        <h1>Sleep Intake Assistant</h1>
        <p>Guided intake for sleep patients, with structured outputs for your workflow.</p>
    </header>

    <main class="app-main">
        <!-- CHAT SECTION -->
        <section class="chat-section">
            <div id="chatWindow" class="chat-window"></div>

            <!-- Chat Input -->
            <form id="chatForm" class="chat-form">
                <input
                    id="chatInput"
                    type="text"
                    class="chat-input"
                    placeholder="Type your message..."
                    autocomplete="off"
                />
                <button type="submit" class="chat-submit">Send</button>
            </form>
        </section>

        <!-- FLOATING MIC BUTTON (Voice Input) -->
        <button id="micButton"
            style="
                position: fixed;
                bottom: 110px;
                right: 25px;
                width: 65px;
                height: 65px;
                border-radius: 50%;
                background: #4f46e5;
                color: white;
                border: none;
                font-size: 28px;
                cursor: pointer;
                box-shadow: 0 0 12px rgba(0,0,0,0.4);
                display: none;
                z-index: 9999;
            ">
            🎤
        </button>

        <!-- FLOATING VOICE MODE TOGGLE -->
        <button id="voiceModeToggle"
            style="
                position: fixed;
                bottom: 25px;
                right: 25px;
                padding: 12px 18px;
                border-radius: 999px;
                background: #22c55e;
                color: #022c22;
                border: none;
                font-size: 15px;
                cursor: pointer;
                box-shadow: 0 0 12px rgba(0,0,0,0.4);
                display: none;
                z-index: 9999;
            ">
            Voice Mode: OFF
        </button>

        <!-- SIDEBAR SECTION -->
        <section class="sidebar-section">
            <div class="card">
                <h2>Session Controls</h2>
                <button id="startInterview" class="btn btn-primary">Start Interview</button>
                <button id="resetInterview" class="btn btn-secondary">Reset</button>
            </div>

            <div class="card">
                <h2>Structured Output</h2>
                <pre id="jsonOutput" class="json-viewer">{}</pre>
            </div>
        </section>
    </main>

    <footer class="app-footer">
        Sleep Intake Assistant • Structured patient interview workflow
    </footer>
</div>

<!-- ========================= -->
<!--   BEGIN JAVASCRIPT LOGIC  -->
<!-- ========================= -->

<script>
    // DOM ELEMENTS
    const chatWindow = document.getElementById("chatWindow");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const jsonOutput = document.getElementById("jsonOutput");

    const startInterviewBtn = document.getElementById("startInterview");
    const resetInterviewBtn = document.getElementById("resetInterview");

    const micButton = document.getElementById("micButton");
    const voiceModeToggle = document.getElementById("voiceModeToggle");

    // INTERVIEW STATE
    let interviewActive = false;
    let voiceMode = false;
    let listening = false;

    // SPEECH RECOGNITION SETUP
    let recognition = null;
    if ("webkitSpeechRecognition" in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = "en-US";
    }
    // ============================
    //  CHAT MESSAGE RENDERING
    // ============================
    function addMessage(sender, text) {
        const msg = document.createElement("div");
        msg.className = `message ${sender}`;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        msg.appendChild(bubble);
        chatWindow.appendChild(msg);

        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ============================
    //  SEND MESSAGE TO BACKEND
    // ============================
    async function sendMessage(text) {
        if (!text.trim()) return;

        addMessage("user", text);

        try {
            const response = await fetch("https://mychatbot-backend.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();

            if (data.reply) {
                addMessage("assistant", data.reply);
            }

            if (data.structured_output) {
                jsonOutput.textContent = JSON.stringify(data.structured_output, null, 2);
            }

            // Auto‑listen again if voice mode is active
            if (voiceMode && interviewActive) {
                startListening();
            }

        } catch (err) {
            addMessage("assistant", "⚠️ Error contacting server.");
        }
    }

    // ============================
    //  CHAT FORM SUBMIT
    // ============================
    chatForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = chatInput.value;
        chatInput.value = "";
        sendMessage(text);
    });
    // ============================
    //  START LISTENING (MIC)
    // ============================
    function startListening() {
        if (!recognition || listening === true) return;

        listening = true;
        micButton.style.background = "#22c55e";

        recognition.start();

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            listening = false;
            micButton.style.background = "#4f46e5";
            sendMessage(transcript);
        };

        recognition.onerror = () => {
            listening = false;
            micButton.style.background = "#4f46e5";
            addMessage("assistant", "⚠️ I couldn't hear that. Try again.");
        };

        recognition.onend = () => {
            listening = false;
            micButton.style.background = "#4f46e5";
        };
    }

    // ============================
    //  MIC BUTTON CLICK
    // ============================
    micButton.addEventListener("click", () => {
        if (!interviewActive) return;
        startListening();
    });

    // ============================
    //  VOICE MODE TOGGLE
    // ============================
    voiceModeToggle.addEventListener("click", () => {
        voiceMode = !voiceMode;

        if (voiceMode) {
            voiceModeToggle.textContent = "Voice Mode: ON";
            voiceModeToggle.style.background = "#16a34a";

            if (interviewActive) {
                startListening();
            }
        } else {
            voiceModeToggle.textContent = "Voice Mode: OFF";
            voiceModeToggle.style.background = "#22c55e";
        }
    });

    // ============================
    //  START INTERVIEW
    // ============================
    startInterviewBtn.addEventListener("click", () => {
        interviewActive = true;

        micButton.style.display = "block";
        voiceModeToggle.style.display = "block";

        addMessage("assistant", "Great! Let's begin your sleep intake interview.");
        addMessage("assistant", "Tell me what brings you in today.");

        if (voiceMode) {
            startListening();
        }
    });

    // ============================
    //  RESET INTERVIEW
    // ============================
    resetInterviewBtn.addEventListener("click", () => {
        interviewActive = false;
        voiceMode = false;
        listening = false;

        micButton.style.display = "none";
        voiceModeToggle.style.display = "none";

        chatWindow.innerHTML = "";
        jsonOutput.textContent = "{}";

        addMessage("assistant", "Interview reset. Ready when you are.");
    });
    // ============================
    //  ASSISTANT SPEAKS OUT LOUD
    // ============================
    function speak(text) {
        try {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);

            // Soft female voice preference
            const voices = synth.getVoices();
            const preferred = voices.find(v =>
                v.name.toLowerCase().includes("female") ||
                v.name.toLowerCase().includes("samantha") ||
                v.name.toLowerCase().includes("google") ||
                v.name.toLowerCase().includes("zira")
            );

            if (preferred) {
                utter.voice = preferred;
            }

            utter.pitch = 1.05;
            utter.rate = 0.97;
            utter.volume = 1.0;

            synth.speak(utter);
        } catch (e) {
            console.warn("Speech synthesis not available.");
        }
    }

    // Speak assistant replies automatically
    const originalAddMessage = addMessage;
    addMessage = function(sender, text) {
        originalAddMessage(sender, text);

        if (sender === "assistant" && voiceMode && interviewActive) {
            speak(text);
        }
    };
</script>
</body>
</html>
