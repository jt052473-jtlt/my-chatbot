<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Intake Assistant</title>

<style>
    :root {
        --blue-main: #007aff;
    }

    * {
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f2f2f7;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    .layout {
        display: flex;
        width: 95%;
        max-width: 1000px;
        gap: 16px;
        padding: 16px 0;
    }

    /* LEFT PANEL */
    .left-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    /* Thin progress bar */
    .progress-container {
        width: 100%;
        height: 4px;
        background: #e5e5ea;
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 8px;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: #ffffff; /* starts white */
        transition: width 0.25s ease, background-color 0.25s ease;
    }

    #chat {
        flex: 1;
        min-height: 260px;
        max-height: 420px;
        overflow-y: auto;
        padding: 12px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        margin-bottom: 10px;
    }

    .message {
        padding: 8px 12px;
        border-radius: 14px;
        margin-bottom: 8px;
        max-width: 80%;
        line-height: 1.4;
        font-size: 14px;
    }

    .bot {
        background: #e5e5ea;
        color: #000;
    }

    .user {
        background: #007aff;
        color: white;
        margin-left: auto;
    }

    /* Settings row – side by side, medium spacing */
    .settings-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
        flex-wrap: wrap;
        font-size: 13px;
    }

    .settings-row .setting-group {
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
    }

    .settings-row select {
        padding: 4px 6px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 13px;
    }

    .settings-row input[type="checkbox"] {
        transform: scale(1.1);
    }

    .input-row {
        display: flex;
        gap: 8px;
    }

    #textInput {
        flex: 1;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid #d1d1d6;
        font-size: 14px;
    }

    #sendBtn {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: #007aff;
        color: white;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        cursor: pointer;
    }

    #sendBtn:hover {
        background: #005fcc;
    }

    /* RIGHT PANEL */
    .right-panel {
        width: 180px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .control-btn {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
    }

    .control-btn:hover {
        background: #f2f2f7;
    }

    /* Mic button */
    #micButton {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #c7c7cc; /* gray when off */
        color: white;
        font-size: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 10px auto 0 auto;
        cursor: pointer;
        transition: 0.2s;
    }

    #micButton.active {
        background: #007aff; /* blue when on */
        box-shadow: 0 0 12px rgba(0,122,255,0.6);
    }

    /* Print button (hidden until end) */
    #printBtn {
        display: none;
        margin-top: 4px;
    }

    /* Responsive tweaks */
    @media (max-height: 750px) {
        #chat {
            max-height: 340px;
        }
        .control-btn {
            padding: 6px;
            font-size: 12px;
        }
        #micButton {
            width: 52px;
            height: 52px;
            font-size: 22px;
        }
    }

    @media (max-width: 800px) {
        .layout {
            max-width: 100%;
        }
        .right-panel {
            width: 160px;
        }
    }
</style>
</head>

<body>

<div class="layout">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="chat"></div>

        <div class="settings-row">
            <div class="setting-group">
                <span>🌐 Language:</span>
                <select id="languageSelect">
                    <option value="en-US">English (US)</option>
                    <option value="es-US">Spanish (US)</option>
                    <option value="ko-KR">Korean</option>
                </select>
            </div>

            <div class="setting-group">
                <span>🔊 Read Aloud</span>
                <input type="checkbox" id="readAloudToggle">
            </div>

            <div class="setting-group">
                <span>🎙️ Voice Mode</span>
                <input type="checkbox" id="voiceModeToggle">
            </div>
        </div>

        <div class="input-row">
            <input id="textInput" type="text" placeholder="Type your response...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">
        <button class="control-btn" id="startBtn">▶️ Start</button>
        <button class="control-btn" id="pauseBtn">⏸️ Pause</button>
        <button class="control-btn" id="finishBtn">🛑 Finish</button>

        <button class="control-btn" id="repeatBtn">🔁 Repeat</button>
        <button class="control-btn" id="skipBtn">⏭️ Skip</button>
        <button class="control-btn" id="resetBtn">🔄 Reset</button>

        <div id="micButton">🎤</div>

        <button class="control-btn" id="printBtn">🖨️ Print Summary</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
