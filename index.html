<!DOCTYPE html>
<html>
<head>
  <title>Sleep Intake Chatbot</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    #chat { background: white; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
    .msg { margin-bottom: 15px; }
    .bot { color: #1a73e8; font-weight: bold; }
    .user { color: #333; }
    input, button { padding: 10px; font-size: 16px; width: 100%; margin-top: 10px; }
  </style>
</head>
<body>

<div id="chat">
  <h2>Sleep Intake Chatbot</h2>
  <div id="messages"></div>

  <input id="answerInput" placeholder="Type your answer..." />
  <button onclick="sendAnswer()">Send</button>
  <button onclick="finishSession()" style="background:#e53935;color:white;">Finish</button>
</div>

<!-- Load your new modules -->
<script type="module">
  import { InterviewFlow } from "./interviewFlow.js";
  import { buildHumanSummary } from "./summaryBuilder.js";

  let flow = new InterviewFlow("full");   // or "quick"
  let sessionActive = true;

  function addMessage(text, sender) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showNextQuestion() {
    const q = flow.getCurrentQuestion();
    if (q) {
      addMessage(q.prompt, "bot");
    } else {
      finishSession();
    }
  }

  window.sendAnswer = function () {
    if (!sessionActive) return;

    const input = document.getElementById("answerInput");
    const answer = input.value.trim();
    if (!answer) return;

    addMessage(answer, "user");
    input.value = "";

    flow.answerCurrentQuestion(answer);

    if (flow.isFinished()) {
      finishSession();
    } else {
      showNextQuestion();
    }
  };

  window.finishSession = async function () {
    if (!sessionActive) return;
    sessionActive = false;

    const packet = flow.getPacket();
    const summary = buildHumanSummary(packet);

    addMessage("Summary:\n" + summary, "bot");

    // Send packet to backend
    await fetch("https://mychatbot-backend-c2yu.onrender.com/stop", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(packet)
    });
  };

  // Start the flow
  showNextQuestion();
</script>

</body>
</html>
